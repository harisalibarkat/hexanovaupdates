version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hexanova_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hexanova
      POSTGRES_PASSWORD: hexanova_pass
      POSTGRES_DB: hexanovaupdates
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexanova -d hexanovaupdates"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hexanova_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hexanova_app
    restart: unless-stopped
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://hexanova:hexanova_pass@postgres:5432/hexanovaupdates
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hexanova_worker
    restart: unless-stopped
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://hexanova:hexanova_pass@postgres:5432/hexanovaupdates
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
